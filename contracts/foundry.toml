[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    "@chainlink/contracts/=lib/chainlink/contracts/",
    "@chainlink-local/=lib/chainlink-local/",
]

[invariant]
runs = 3000
depth = 15
fail_on_revert = true

[fuzz]
runs = 10000
max_test_rejects = 100000
